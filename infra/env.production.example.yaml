# Contoh variabel production (salin ke backend/.env — bukan Kubernetes ConfigMap)
# Proyek ini tidak memakai Docker/K8s.

database:
  host: mountainconnect-staging-db.example.ap-southeast-1.rds.amazonaws.com
  port: 3306
  database: mountainconnect
  username: mountainconnect_admin
  # password: via DB_PASSWORD di .env

redis:
  url: redis://mountainconnect-staging-redis.example:6379

app:
  node_env: production
  port: 4000
  cors_origins: https://dashboard.mountainconnect.id,https://mountainconnect.id
  log_level: info

dashboard:
  nextauth_url: https://dashboard.mountainconnect.id
  next_public_api_url: https://api.mountainconnect.id
