apiVersion: apps/v1
kind: Deployment
metadata:
  name: mountainconnect-worker
  namespace: mountainconnect
  labels:
    app: mountainconnect
    tier: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: mountainconnect
      tier: worker
  template:
    metadata:
      labels:
        app: mountainconnect
        tier: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-southeast-1.amazonaws.com/mountainconnect-worker:latest
          imagePullPolicy: Always
          command: ["node", "dist/worker/index.js"]
          envFrom:
            - configMapRef:
                name: mountainconnect-config
            - secretRef:
                name: mountainconnect-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(process.connected ? 0 : 1)"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(global.queueConnected ? 0 : 1)"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
