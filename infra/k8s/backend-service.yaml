apiVersion: v1
kind: Service
metadata:
  name: mountainconnect-api
  namespace: mountainconnect
  labels:
    app: mountainconnect
    tier: api
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "4000"
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
      name: http
      protocol: TCP
  selector:
    app: mountainconnect
    tier: api
