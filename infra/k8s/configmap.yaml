apiVersion: v1
kind: ConfigMap
metadata:
  name: mountainconnect-config
  namespace: mountainconnect
  labels:
    app: mountainconnect
data:
  DATABASE_URL: "postgresql://mountainconnect_admin@mountainconnect-staging-db.xxxxxxxx.ap-southeast-1.rds.amazonaws.com:5432/mountainconnect"
  REDIS_URL: "redis://mountainconnect-staging-redis.xxxxxxxx.ap-southeast-1.elasticache.amazonaws.com:6379"
  NODE_ENV: "production"
  API_PORT: "4000"
  CORS_ORIGINS: "https://dashboard.mountainconnect.id,https://mountainconnect.id"
  LOG_LEVEL: "info"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
  SENTRY_ENVIRONMENT: "production"
  MAX_FILE_SIZE_MB: "10"
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
  JWT_EXPIRY: "24h"
  REFRESH_TOKEN_EXPIRY: "7d"
  BULLMQ_PREFIX: "mountainconnect"
  BULLMQ_CONCURRENCY: "10"
